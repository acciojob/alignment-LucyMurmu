<!DOCTYPE html>
<html lang="en">

<head>
    <title>HTML Assignment 3</title>

    <style>
        body {
            background-color: #f0f0f0;
        }

        h3 {
            text-align: center;
        }

        table {
            border: 1px solid black;
            border-spacing: 1px;
            width: 95%;
            margin: 20px auto;
        }

        td {
            border: 1px solid black;
            padding: 1px;
        }

        .middle {
            margin-left: auto;
            margin-right: auto;
        }

        .center {
            text-align: center;
        }

        .right {
            text-align: right;
        }

        .green {
            background-color: green;
            height: 15px;
        }

        .blue {
            background-color: blue;
            height: 15px;
        }

        #table-3 img {
            display: block;
            margin: auto;
            width: 200px;
            height: 130px;
        }
    </style>
</head>

<body>

    <h3>HTML Assignment #3</h3>

        </tr>

        <tr>

</html>
